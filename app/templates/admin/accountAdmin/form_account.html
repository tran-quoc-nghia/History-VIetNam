{% extends "admin/base_admin.html" %}
{% block title %}{% if account %}Cập nhật Tài khoản{% else %}Thêm Tài khoản{% endif %}{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    <h3 style="margin-bottom: 20px; color: #2a5298;">
        {% if account %}<i class="fas fa-user-edit"></i> Cập nhật Tài khoản{% else %}<i class="fas fa-user-plus"></i> Thêm Tài khoản Mới{% endif %}
    </h3>

    <form id="accountForm" onsubmit="submitAccount(event)">
        <input type="hidden" name="id" value="{{ account.id if account else '' }}">
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Họ và Tên (*)</label>
            <input type="text" name="name" class="form-control" value="{{ account.name if account else '' }}" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Địa chỉ Email (*)</label>
            <input type="email" name="email" class="form-control" value="{{ account.email if account else '' }}" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Phân quyền (*)</label>
            <select name="role" class="form-control" required>
                <option value="user" {% if account and account.role == 'user' %}selected{% endif %}>Người dùng / Học viên</option>
                <option value="admin" {% if account and account.role == 'admin' %}selected{% endif %}>Quản trị viên (Admin)</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label>Mật khẩu {% if account %}(Để trống nếu không muốn đổi){% else %}(*){% endif %}</label>
            <input type="text" name="password" class="form-control" placeholder="Nhập mật khẩu" {% if not account %}required{% endif %}>
        </div>

        <div style="text-align: right;">
            <a href="{{ url_for('admin.account_admin_dashboard') }}" class="btn btn-secondary">Hủy</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu thông tin</button>
        </div>
    </form>
</div>

<script>
function submitAccount(e) {
    e.preventDefault();
    const formData = new FormData(document.getElementById('accountForm'));
    const isUpdate = formData.get('id') !== '';
    const method = isUpdate ? 'PUT' : 'POST';

    fetch('/admin/api/accounts', {
        method: method,
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.success) {
            alert(data.message);
            window.location.href = "{{ url_for('admin.account_admin_dashboard') }}";
        } else {
            alert('Lỗi: ' + data.error);
        }
    })
    .catch(err => alert("Lỗi kết nối!"));
}
</script>
{% endblock %}
