{% extends "admin/base_admin.html" %}

{% block title %}{{ 'Sửa Quốc Gia' if country else 'Thêm Quốc Gia' }}{% endblock %}

{% block content %}
<div class="form-layout">
    <div id="crudForm">
        <input type="hidden" id="nodeId" value="{{ country.id if country else '' }}">
        
        <div class="form-group">
            <label>Tên quốc gia <span style="color:red;">*</span></label>
            <input type="text" id="nodeName" value="{{ country.name if country else '' }}" placeholder="VD: Việt Nam Dân chủ Cộng hòa" required>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Thủ đô </label>
                <input type="text" id="nodeCapital" value="{{ country.capital if country else '' }}" placeholder="VD: Hà Nội">
            </div>
            <div class="form-group">
                <label>Khu vực</label>
                <input type="text" id="nodeRegion" value="{{ country.region if country else '' }}" placeholder="VD: Đông Nam Á">
            </div>
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>Mô tả chi tiết</label>
            <textarea id="nodeDescription" rows="6" placeholder="Mô tả bối cảnh, lịch sử hình thành quốc gia...">{{ country.description if country else '' }}</textarea>
        </div>

        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; text-align: right;">
            <a href="/admin/countryAdmin" class="btn-cancel" style="background: #95a5a6; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-right: 10px;"><i class="fas fa-times"></i> Hủy bỏ</a>
            <button class="btn-save" onclick="saveCountry()" style="background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;"><i class="fas fa-save"></i> Lưu dữ liệu</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function saveCountry() {
        // Xóa lỗi cũ
        document.querySelectorAll('.error-msg').forEach(el => el.remove());
        const fields = ['nodeName', 'nodeCapital', 'nodeRegion', 'nodeDescription'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.borderColor = '#ccc';
        });

        let nameValue = document.getElementById('nodeName').value.trim();
        let capitalValue = document.getElementById('nodeCapital').value.trim();
        let regionValue = document.getElementById('nodeRegion').value.trim();
        let descValue = document.getElementById('nodeDescription').value.trim();

        let isValid = true;
        let firstFocus = null;

        function showError(id, message) {
            const el = document.getElementById(id);
            el.style.borderColor = '#e74c3c';
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-msg';
            errorDiv.style.color = '#e74c3c';
            errorDiv.style.fontSize = '12.5px';
            errorDiv.style.marginTop = '6px';
            errorDiv.style.fontStyle = 'italic';
            errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + message;
            el.parentNode.appendChild(errorDiv);
            if (!firstFocus) firstFocus = el;
            isValid = false;
        }

        if (!nameValue) showError('nodeName', 'Vui lòng nhập Tên quốc gia!');

        if (!isValid) {
            firstFocus.focus();
            return;
        }

        // Gán "Không rõ" cho các trường không bắt buộc nếu trống
        if (!capitalValue) capitalValue = 'Không rõ';
        if (!regionValue) regionValue = 'Không rõ';
        if (!descValue) descValue = 'Không rõ';

        const saveBtn = document.querySelector('.btn-save');
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
        saveBtn.disabled = true;

        const formData = new FormData();
        formData.append('id', document.getElementById('nodeId').value);
        formData.append('name', nameValue);
        formData.append('capital', capitalValue);
        formData.append('region', regionValue);
        formData.append('description', descValue);

        const method = document.getElementById('nodeId').value ? 'PUT' : 'POST';

        fetch('/admin/api/countries', {
            method: method,
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                window.location.href = '/admin/countryAdmin';
            } else {
                alert("Lỗi: " + data.error);
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Lưu dữ liệu';
                saveBtn.disabled = false;
            }
        })
        .catch(err => {
            alert("Lỗi kết nối API: " + err);
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Lưu dữ liệu';
            saveBtn.disabled = false;
        });
    }
</script>
{% endblock %}
