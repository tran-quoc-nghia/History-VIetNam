        /* Style cho bộ lọc nhãn */
        .filter-group { background: #f0f4f8; padding: 15px; border-radius: 8px; border: 1px dashed #2a5298; margin-bottom: 10px; }

        .btn-cancel { background: #95a5a6; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; text-decoration: none; display: inline-block; margin-left: 10px;}
        .relation-diagram { text-align: center; font-size: 24px; color: #f39c12; margin: 10px 0; }
    </style>
{% endblock %}

                <div id="crudForm">
                    <div class="filter-group">
                        <label><i class="fas fa-filter"></i> Loại thực thể Nguồn</label>
                        <select id="sourceLabelFilter" onchange="filterNodes('sourceLabelFilter', 'sourceId')">
                            <option value="all">-- Hiển thị tất cả --</option>
                            {% for key, value in label_mapping.items() %}
                                {% if key != 'Relationships' %}
                                    <option value="{{ key }}">{{ value }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Thực thể nguồn (Từ) *</label>
                        <select id="sourceId" required>
                            <option value="">-- Chọn thực thể nguồn --</option>
                            {% for node in nodes %}
                                <option value="{{ node.id }}" data-label="{{ node.type }}"
                                    {% if rel_data and rel_data.source_id == node.id %} selected 
                                    {% elif pre_source_id == node.id %} selected {% endif %}>
                                    {{ node.name }} [{{ label_mapping.get(node.type, node.type) }}]
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Loại mối quan hệ *</label>
                        <input type="text" id="relType" list="existingRelTypes" required 
                            placeholder="Chọn hoặc nhập mới..." 
                            value="{{ rel_data.rel_type if rel_data else '' }}">
                        <datalist id="existingRelTypes">
                            {% for type in rel_types %}
                                <option value="{{ type }}">
                            {% endfor %}
                        </datalist>
                    </div>
                    
                    <div class="filter-group">
                        <label><i class="fas fa-filter"></i> Loại thực thể Đích</label>
                        <select id="targetLabelFilter" onchange="filterNodes('targetLabelFilter', 'targetId')">
                            <option value="all">-- Hiển thị tất cả --</option>
                            {% for key, value in label_mapping.items() %}
                                {% if key != 'Relationships' %}
                                    <option value="{{ key }}">{{ value }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Thực thể đích (Đến) *</label>
                        <select id="targetId" required>
                            <option value="">-- Chọn thực thể đích --</option>
                            {% for node in nodes %}
                                <option value="{{ node.id }}" data-label="{{ node.type }}"
                                    {% if rel_data and rel_data.target_id == node.id %} selected {% endif %}>
                                    {{ node.name }} [{{ label_mapping.get(node.type, node.type) }}]

                    </div>
                </div>
            </div>
        </main>
{% endblock %}

{% block extra_js %}
    <script>
        const allOptions = {
            sourceId: Array.from(document.getElementById('sourceId').options),
            targetId: Array.from(document.getElementById('targetId').options)
        };

        function filterNodes(filterSelectId, targetSelectId) {
            const label = document.getElementById(filterSelectId).value;
            const targetSelect = document.getElementById(targetSelectId);
            
            targetSelect.innerHTML = '';

            allOptions[targetSelectId].forEach(opt => {
                const optLabel = opt.getAttribute('data-label');
                if (opt.value === "" || label === 'all' || optLabel === label) {
                    targetSelect.appendChild(opt.cloneNode(true));
                }
            });
            
            targetSelect.selectedIndex = 0; 
        }

        // Hàm hỗ trợ: Chuyển tiếng Việt có dấu thành không dấu
        function removeVietnameseTones(str) {
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ữ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            return str;
        }

        function saveData() {
            // Xóa lỗi cũ
            document.querySelectorAll('.error-msg').forEach(el => el.remove());
            const fields = ['sourceId', 'targetId', 'relType'];
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.borderColor = '#ccc';
            });

            let isValid = true;
            let firstFocus = null;

            function showError(id, message) {
                const el = document.getElementById(id);
                if (!el) return;
                el.style.borderColor = '#e74c3c';
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-msg';
                errorDiv.style.color = '#e74c3c';
                errorDiv.style.fontSize = '12.5px';
                errorDiv.style.marginTop = '6px';
                errorDiv.style.fontStyle = 'italic';
                errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + message;
                el.parentNode.appendChild(errorDiv);
                if (!firstFocus) firstFocus = el;
                isValid = false;
            }

            const sourceId = document.getElementById('sourceId').value;
            const targetId = document.getElementById('targetId').value;
            let rawRelType = document.getElementById('relType').value;
            let relType = removeVietnameseTones(rawRelType).trim().toUpperCase().replace(/\s+/g, '_');

            // Bắt lỗi rỗng
            if (!sourceId) showError('sourceId', 'Vui lòng chọn Thực thể nguồn!');
            if (!targetId) showError('targetId', 'Vui lòng chọn Thực thể đích!');
            if (!relType) showError('relType', 'Vui lòng nhập hoặc chọn Loại mối quan hệ!');

            if (!isValid) {
                firstFocus.scrollIntoView({ behavior: 'smooth', block: 'center' });
                firstFocus.focus();
                return;
            }

            // Bắt lỗi trùng thực thể
            if (sourceId === targetId) {
                showError('targetId', 'Thực thể đích không được trùng với Thực thể nguồn!');
                return;
            }

            const saveBtn = document.querySelector('.btn-save');
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            saveBtn.disabled = true;

            const payloadData = {
                source_id: sourceId,
                target_id: targetId,
                rel_type: relType
            };

            fetch('/admin/api/relationships', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payloadData)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert(data.message);
                    window.history.back();
                } else {
                    if (data.error.includes("ĐÃ TỒN TẠI")) {
                        showError('relType', data.error);
                    } else if (data.error.includes("bị xóa hoặc không tồn tại")) {
                        showError('sourceId', data.error);
                    } else {
                        alert("Lỗi: " + data.error);
                    }
                    saveBtn.innerHTML = '<i class="fas fa-save"></i> Lưu Liên Kết';
                    saveBtn.disabled = false;
                }
            })
            .catch(err => {
                alert("Lỗi kết nối API: " + err);
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Lưu Liên Kết';
                saveBtn.disabled = false;
            });
        }
    </script>
{% endblock %}
