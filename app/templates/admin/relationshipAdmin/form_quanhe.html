    <script>
        const allOptions = {
            sourceId: Array.from(document.getElementById('sourceId').options),
            targetId: Array.from(document.getElementById('targetId').options)
        };

        function filterNodes(filterSelectId, targetSelectId) {
            const label = document.getElementById(filterSelectId).value;
            const targetSelect = document.getElementById(targetSelectId);
            
            targetSelect.innerHTML = '';

            allOptions[targetSelectId].forEach(opt => {
                const optLabel = opt.getAttribute('data-label');
                if (opt.value === "" || label === 'all' || optLabel === label) {
                    targetSelect.appendChild(opt.cloneNode(true));
                }
            });
            
            targetSelect.selectedIndex = 0; 
        }

        // HГ m hб»— trб»Ј: Chuyб»ғn tiбәҝng Viб»Үt cГі dбәҘu thГ nh khГҙng dбәҘu
        function removeVietnameseTones(str) {
            str = str.replace(/Г |ГЎ|бәЎ|бәЈ|ГЈ|Гў|бә§|бәҘ|бәӯ|бә©|бә«|Дғ|бәұ|бәҜ|бә·|бәі|бәө/g, "a");
            str = str.replace(/ГЁ|Г©|бә№|бә»|бәҪ|ГӘ|б»Ғ|бәҝ|б»Ү|б»ғ|б»…/g, "e");
            str = str.replace(/Г¬|Гӯ|б»Ӣ|б»ү|Д©/g, "i");
            str = str.replace(/ГІ|Гі|б»Қ|б»Ҹ|Гө|Гҙ|б»“|б»‘|б»ҷ|б»•|б»—|ЖЎ|б»қ|б»ӣ|б»Ј|б»ҹ|б»Ў/g, "o");
            str = str.replace(/Г№|Гә|б»Ҙ|б»§|Е©|Ж°|б»«|б»©|б»ұ|б»ӯ|б»Ҝ/g, "u");
            str = str.replace(/б»і|ГҪ|б»ө|б»·|б»№/g, "y");
            str = str.replace(/Д‘/g, "d");
            str = str.replace(/ГҖ|ГҒ|бә |бәў|Гғ|ГӮ|бәҰ|бәӨ|бә¬|бәЁ|бәӘ|ДӮ|бә°|бә®|бә¶|бәІ|бәҙ/g, "A");
            str = str.replace(/ГҲ|Гү|бәё|бәә|бәј|ГҠ|б»Җ|бәҫ|б»Ҷ|б»Ӯ|б»„/g, "E");
            str = str.replace(/ГҢ|ГҚ|б»Ҡ|б»Ҳ|ДЁ/g, "I");
            str = str.replace(/Г’|Г“|б»Ң|б»Һ|Г•|Г”|б»’|б»җ|б»ҳ|б»”|б»–|Ж |б»ң|б»ҡ|б»ў|б»һ|б»®/g, "O");
            str = str.replace(/Гҷ|Гҡ|б»Ө|б»Ұ|ЕЁ|ЖҜ|б»Ә|б»Ё|б»°|б»¬|б»®/g, "U");
            str = str.replace(/б»І|Гқ|б»ҙ|б»¶|б»ё/g, "Y");
            str = str.replace(/Дҗ/g, "D");
            return str;
        }

        function saveData() {
            const sourceId = document.getElementById('sourceId').value;
            const targetId = document.getElementById('targetId').value;
            
            let rawRelType = document.getElementById('relType').value;
            let relType = removeVietnameseTones(rawRelType);
            relType = relType.trim().toUpperCase().replace(/\s+/g, '_');

            if (!sourceId || !targetId || !relType) {
                alert("Vui lГІng chб»Қn Д‘бә§y Д‘б»§ Nguб»“n, ДҗГӯch vГ  nhбәӯp LoбәЎi quan hб»Ү!");
                return;
            }

            if (sourceId === targetId) {
                alert("Thб»ұc thб»ғ nguб»“n vГ  Д‘Гӯch khГҙng Д‘Ж°б»Јc giб»‘ng nhau!");
                return;
            }

            const payloadData = {
                source_id: sourceId,
                target_id: targetId,
                rel_type: relType
            };

            fetch('/admin/api/relationships', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payloadData)
            })
            .then(res => res.json())
            .then(result => {
                if(result.success) {
                    alert(result.message);
                    window.location.href = '/admin/relationshipAdmin';
                } else {
                    alert("Lб»—i: " + result.error);
                }
            })
            .catch(err => alert("Lб»—i kбәҝt nб»‘i API: " + err));
        }
