{% extends "admin/base_admin.html" %}

{% block title %}{{ 'Sửa Hiệp Định' if treaty else 'Thêm Hiệp Định' }}{% endblock %}

{% block content %}
<div class="form-layout">
    <p style="color: #e74c3c; font-size: 13px; margin-bottom: 20px; font-style: italic;">
        <i class="fas fa-info-circle"></i> Hệ thống sẽ tự động xếp Hiệp định vào "Thời kỳ" tương ứng dựa trên <strong>Năm</strong> ký kết.
    </p>

    <div id="crudForm">
        <input type="hidden" id="nodeId" value="{{ treaty.id if treaty else '' }}">
                
        <div class="form-grid">
            <!-- CỘT TRÁI: THÔNG TIN CƠ BẢN -->
            <div>
                <div class="form-group">
                    <label>Tên hiệp định <span style="color:red;">*</span></label>
                    <input type="text" id="nodeName" value="{{ treaty.name if treaty else '' }}" placeholder="VD: Hiệp định Paris">
                </div>
                
                <div class="form-group">
                    <label>Ngày kí chính thức <span style="color:red;">*</span></label>
                    <!-- Chuyển thành dạng text để kiểm soát hiển thị dd/mm/yyyy -->
                    <input type="text" id="nodeSigningDate" value="{{ treaty.signing_date if treaty else '' }}" placeholder="VD: 27/01/1973">
                </div>

                <div class="form-group">
                    <label>Năm <small style="font-weight: normal; color: #888;">(Để trống sẽ tự lấy từ Ngày ký)</small></label>
                    <input type="number" id="nodeYear" value="{{ treaty.year if treaty else '' }}" placeholder="VD: 1973">
                </div>

                <div class="form-group">
                    <label>Địa điểm <span style="color:red;">*</span></label>
                    <input type="text" id="nodeLocation" value="{{ treaty.location if treaty else '' }}" placeholder="VD: Paris, Pháp">
                </div>
            </div>

            <!-- CỘT PHẢI: MÔ TẢ NGẮN -->
            <div>
                <div class="form-group" style="height: 100%;">
                    <label>Hoàn cảnh / Mô tả chung</label>
                    <textarea id="nodeDescription" style="height: 310px;" placeholder="Hoàn cảnh ra đời của hiệp định...">{{ treaty.description if treaty else '' }}</textarea>
                </div>
            </div>
        </div>

        <!-- CÁC TRƯỜNG DỮ LIỆU DÀI BÊN DƯỚI -->
        <div class="form-group" style="margin-top: 15px;">
            <label>Nội dung chính</label>
            <textarea id="nodeNoiDungChinh" rows="5" placeholder="Các điều khoản trọng tâm của hiệp định...">{{ treaty.noi_dung_chinh if treaty else '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Ý nghĩa lịch sử</label>
            <textarea id="nodeYNghia" rows="4" placeholder="Ý nghĩa, tầm quan trọng của hiệp định này...">{{ treaty.y_nghia if treaty else '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Bài học kinh nghiệm</label>
            <textarea id="nodeBaiHoc" rows="3" placeholder="Các bài học rút ra từ cuộc đàm phán...">{{ treaty.bai_hoc_kinh_nghiem if treaty else '' }}</textarea>
        </div>

        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; text-align: right;">
            <a href="/admin/treatyAdmin" class="btn-cancel" style="background: #95a5a6; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-right: 10px;"><i class="fas fa-times"></i> Hủy bỏ</a>
            <button class="btn-save" onclick="saveData()" style="background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;"><i class="fas fa-save"></i> Lưu dữ liệu</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function formatVietnameseName(str) {
        if (!str) return '';
        return str.trim().replace(/\s+/g, ' ').toLowerCase().replace(/(^|\s)\S/g, letter => letter.toUpperCase()); 
    }

    // Hàm chuyển đổi YYYY-MM-DD (kể cả có đuôi thời gian T) sang DD/MM/YYYY
    function convertToVNFormat(dateStr) {
        if (!dateStr) return '';
        dateStr = dateStr.trim();
        
        // 1. Cắt bỏ phần đuôi thời gian nếu có (chữ T hoặc khoảng trắng)
        if (dateStr.includes('T')) {
            dateStr = dateStr.split('T')[0];
        } else if (dateStr.includes(' ')) {
            dateStr = dateStr.split(' ')[0];
        }

        // 2. Lật ngược YYYY-MM-DD sang DD/MM/YYYY
        if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) {
            const parts = dateStr.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        
        return dateStr; // Trả về nguyên gốc nếu nó đã đúng chuẩn
    }

    document.addEventListener('DOMContentLoaded', function() {
        const inputName = document.getElementById('nodeName');
        const inputLocation = document.getElementById('nodeLocation');

        if (inputName) inputName.addEventListener('blur', function() { this.value = formatVietnameseName(this.value); });
        if (inputLocation) inputLocation.addEventListener('blur', function() { this.value = formatVietnameseName(this.value); });

        // Ép định dạng dd/mm/yyyy khi vừa load trang (Bao gồm xóa chữ T)
        const dateInput = document.getElementById('nodeSigningDate');
        if (dateInput && dateInput.value) {
            dateInput.value = convertToVNFormat(dateInput.value);
        }
    });

    function saveData() {
        const nameField = formatVietnameseName(document.getElementById('nodeName').value);
        const signingDateField = document.getElementById('nodeSigningDate').value.trim();
        const locationField = formatVietnameseName(document.getElementById('nodeLocation').value);

        // Reset lại màu viền và xóa các cảnh báo cũ
        const requiredFields = ['nodeName', 'nodeSigningDate', 'nodeLocation'];
        requiredFields.forEach(id => {
            const el = document.getElementById(id);
            el.style.borderColor = '#ccc';
            const oldError = el.parentNode.querySelector('.error-msg');
            if (oldError) oldError.remove();
        });

        let isValid = true;
        let firstFocus = null;

        // Hàm tô viền đỏ và in ra cảnh báo
        function showError(id, message) {
            const el = document.getElementById(id);
            el.style.borderColor = '#e74c3c';
            
            const errorMsg = document.createElement('div');
            errorMsg.className = 'error-msg';
            errorMsg.style.color = '#e74c3c';
            errorMsg.style.fontSize = '12.5px';
            errorMsg.style.marginTop = '6px';
            errorMsg.style.fontStyle = 'italic';
            errorMsg.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + message;
            
            el.parentNode.appendChild(errorMsg);
            if (!firstFocus) firstFocus = el;
            isValid = false;
        }

        // Bắt lỗi dữ liệu trống
        if(!nameField) showError('nodeName', 'Vui lòng nhập Tên hiệp định!');
        if(!signingDateField) showError('nodeSigningDate', 'Vui lòng nhập Ngày kí chính thức!');
        if(!locationField) showError('nodeLocation', 'Vui lòng nhập Địa điểm!');

        // Nếu có lỗi thì block lệnh gửi lên Server và focus chuột vào ô đầu tiên bị lỗi
        if(!isValid) {
            firstFocus.focus();
            return;
        }

        let yearField = document.getElementById('nodeYear').value.trim();
        let descField = document.getElementById('nodeDescription').value.trim() || "Không rõ";
        let noiDungField = document.getElementById('nodeNoiDungChinh').value.trim() || "Không rõ";
        let yNghiaField = document.getElementById('nodeYNghia').value.trim() || "Không rõ";
        let baiHocField = document.getElementById('nodeBaiHoc').value.trim() || "Không rõ";

        // Tự động tách Năm từ Ngày ký (Hỗ trợ định dạng dd/mm/yyyy)
        if(!yearField && signingDateField) {
            if(signingDateField.includes('/')) {
                yearField = signingDateField.split('/').pop();
            } else if (signingDateField.includes('-')) {
                yearField = signingDateField.split('-')[0];
            } else {
                const match = signingDateField.match(/\d{4}/);
                if(match) yearField = match[0];
            }
        }

        const saveBtn = document.querySelector('.btn-save');
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
        saveBtn.disabled = true;

        const formData = new FormData();
        formData.append('id', document.getElementById('nodeId').value);
        formData.append('name', nameField);
        formData.append('signing_date', signingDateField);
        formData.append('year', yearField);
        formData.append('location', locationField);
        formData.append('description', descField);
        formData.append('noi_dung_chinh', noiDungField);
        formData.append('y_nghia', yNghiaField);
        formData.append('bai_hoc_kinh_nghiem', baiHocField);

        const id = document.getElementById('nodeId').value;
        const method = id ? 'PUT' : 'POST';

        fetch('/admin/api/treaties', {
            method: method,
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                window.location.href = '/admin/treatyAdmin';
            } else {
                alert("Lỗi: " + data.error);
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Lưu dữ liệu';
                saveBtn.disabled = false;
            }   
        }).catch(err => {
            alert("Lỗi kết nối API: " + err);
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Lưu dữ liệu';
            saveBtn.disabled = false;
        });
    }
</script>
{% endblock %}
